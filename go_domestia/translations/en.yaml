configuration:
  ip_address:
    name: Controller IP address
    description: IP address of the Domestia controller on your network.
  refresh_frequency:
    name: Refresh frequency (ms)
    description: >-
      How often to poll the controller for state changes and publish updates.
      Defaults to 2000 ms.
  mqtt:
    name: MQTT broker
    description: >-
      Connection details for your MQTT broker. Use core-mosquitto if you run
      the official Mosquitto broker add-on.
  lights:
    name: Lights
    description: >-
      The controller relays to expose to Home Assistant. Each entry needs a
      name and relay number; mark dimmable channels and always-on relays as
      needed.
